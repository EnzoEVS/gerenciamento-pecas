<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peças & Oficina</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --bg:#0f0f0f; --bg2:#181818; --bg3:#222;
  --border:#2e2e2e; --border2:#3a3a3a;
  --text:#f0ede8; --text2:#8a8680; --text3:#555;
  --accent:#e8d5a3; --accent2:#c9aa6e;
  --red:#e05555; --yellow:#d4a843; --green:#5aaa72;
  --radius:10px; --radius-lg:16px;
}
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; font-size:15px; line-height:1.5; }
h1,h2,h3 { font-family:'Syne',sans-serif; }
#app { max-width:860px; margin:0 auto; padding:2rem 1.5rem 4rem; }

.app-header { display:flex; align-items:center; gap:1rem; margin-bottom:3rem; }
.app-logo { width:38px; height:38px; background:var(--accent2); border-radius:8px; display:flex; align-items:center; justify-content:center; font-family:'Syne',sans-serif; font-weight:700; font-size:18px; color:#0f0f0f; }
.app-title { font-size:18px; font-weight:600; }
.app-subtitle { font-size:13px; color:var(--text2); }

.back-btn { display:inline-flex; align-items:center; gap:6px; font-size:13px; color:var(--text2); background:none; border:none; cursor:pointer; margin-bottom:1rem; font-family:'DM Sans',sans-serif; transition:color .15s; }
.back-btn:hover { color:var(--text); }

.search-hero { margin-bottom:1.5rem; }
.search-hero h2 { font-size:2rem; margin-bottom:.5rem; }
.search-hero p { color:var(--text2); margin-bottom:1rem; }
.search-field { max-width:420px; }
.search-field input { width:100%; padding:11px 14px; border-radius:10px; border:1px solid var(--border); background:var(--bg3); color:var(--text); font-size:15px; font-family:'DM Sans',sans-serif; outline:none; transition:border-color .2s; }
.search-field input:focus { border-color:var(--accent2); }

.results-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem; gap:1rem; flex-wrap:wrap; }
.results-label { font-size:13px; color:var(--text3); text-transform:uppercase; letter-spacing:.08em; }

.car-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:12px; }

.car-card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius-lg); padding:1.1rem 1.2rem; cursor:pointer; transition:border-color .2s, transform .15s; position:relative; color:var(--accent2); }
.car-card:hover { border-color:var(--accent2); transform:translateY(-2px); }
.card-illustration { display:flex; justify-content:center; align-items:center; height:56px; margin-bottom:10px; opacity:.5; transition:opacity .2s; }
.car-card:hover .card-illustration { opacity:.8; }
.car-card-model { font-family:'Syne',sans-serif; font-size:16px; font-weight:600; color:var(--text); margin-bottom:2px; }
.car-card-sub { font-size:12px; color:var(--text2); }
.card-actions { display:flex; justify-content:flex-end; margin-top:10px; }
.remove-btn { border:none; background:none; color:var(--text3); cursor:pointer; font-size:12px; font-family:'DM Sans',sans-serif; transition:color .15s; padding:2px 0; }
.remove-btn:hover { color:var(--red); }

.empty-state { grid-column:1/-1; text-align:center; padding:3rem 1rem; color:var(--text3); font-size:14px; line-height:1.8; }

.parts-header { display:flex; align-items:flex-start; justify-content:space-between; gap:1rem; margin-bottom:2rem; flex-wrap:wrap; }
.car-name { font-family:'Syne',sans-serif; font-size:1.8rem; }
.car-meta { color:var(--text2); }

.add-part-btn { display:inline-flex; align-items:center; gap:8px; background:var(--accent2); color:#0f0f0f; border:none; border-radius:var(--radius); padding:10px 18px; font-size:14px; font-weight:500; cursor:pointer; font-family:'DM Sans',sans-serif; transition:background .15s; white-space:nowrap; }
.add-part-btn:hover { background:var(--accent); }

.cat-chips { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:1.5rem; }
.chip { padding:5px 14px; border-radius:99px; border:1px solid var(--border); background:transparent; color:var(--text2); cursor:pointer; font-family:'DM Sans',sans-serif; font-size:13px; transition:all .15s; }
.chip:hover { border-color:var(--border2); color:var(--text); }
.chip.active { background:var(--accent2); color:#000; border-color:var(--accent2); }

.parts-list { display:flex; flex-direction:column; gap:8px; }
.part-row { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:1rem 1.2rem; display:flex; align-items:center; gap:1rem; transition:border-color .2s; }
.part-row:hover { border-color:var(--border2); }
.part-row.stock-zero { border-color:rgba(224,85,85,.25); }
.part-row.stock-low  { border-color:rgba(212,168,67,.25); }

.part-icon {
  flex-shrink: 0;
  width: 38px;
  height: 38px;
  border-radius: 8px;
  background: var(--bg3);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: .6;
}

.part-info { flex: 1; min-width: 0; }

.part-name {
  font-size: 15px;
  font-weight: 500;
}

.part-cat {
  display: inline-block;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 99px;
  margin-top: 4px;
  font-weight: 500;
}

.cat-motor       { background: rgba(90,170,114,.15);  color: #5aaa72; }
.cat-eletrica    { background: rgba(232,213,163,.12); color: #e8d5a3; }
.cat-freios      { background: rgba(224,85,85,.15);   color: #e05555; }
.cat-ar          { background: rgba(100,160,220,.15); color: #78b4e0; }
.cat-transmissao { background: rgba(180,130,220,.15); color: #c090e0; }
.cat-suspensao   { background: rgba(212,168,67,.15);  color: #d4a843; }
.cat-funilaria   { background: rgba(160,200,160,.15); color: #80c080; }
.cat-outro       { background: rgba(138,134,128,.15); color: #8a8680; }

.part-stock { text-align:center; min-width:54px; }
.stock-num { font-family:'Syne',sans-serif; font-size:22px; font-weight:700; transition:transform .2s; }
.stock-num.bump { transform:scale(1.35); }
.stock-zero .stock-num { color:var(--red); }
.stock-low  .stock-num { color:var(--yellow); }
.stock-ok   .stock-num { color:var(--green); }
.stock-label { font-size:11px; color:var(--text3); margin-top:2px; }

.part-actions { display:flex; gap:6px; align-items:center; }
.qty-btn, .edit-btn, .del-part-btn { width:32px; height:32px; border-radius:8px; border:1px solid var(--border); background:var(--bg3); color:var(--text); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:16px; font-family:'DM Sans',sans-serif; transition:background .15s, border-color .15s, color .15s; }
.qty-btn:hover { background:var(--border); }
.qty-btn.plus:hover  { background:rgba(90,170,114,.2);  border-color:var(--green); color:var(--green); }
.qty-btn.minus:hover { background:rgba(224,85,85,.12); border-color:rgba(224,85,85,.4); color:var(--red); }
.edit-btn { font-size:14px; color:var(--text3); }
.edit-btn:hover { color:var(--text2); border-color:var(--border2); }
.del-part-btn { color:var(--text3); }
.del-part-btn:hover { background:rgba(224,85,85,.12); border-color:rgba(224,85,85,.4); color:var(--red); }

.drawer-backdrop { position:fixed; inset:0; background:rgba(0,0,0,.6); opacity:0; pointer-events:none; transition:.3s; z-index:100; }
.drawer-backdrop.open { opacity:1; pointer-events:all; }
.drawer { position:fixed; bottom:0; left:50%; transform:translateX(-50%) translateY(100%); width:min(560px,100vw); background:var(--bg2); border-radius:20px 20px 0 0; border:1px solid var(--border); border-bottom:none; padding:1.5rem; transition:.35s cubic-bezier(.32,1,.28,1); z-index:101; }
.drawer.open { transform:translateX(-50%) translateY(0); }
.drawer-handle { width:36px; height:4px; background:var(--border2); border-radius:99px; margin:0 auto 1.25rem; }
.drawer-title { font-family:'Syne',sans-serif; font-size:1.1rem; font-weight:700; margin-bottom:1.25rem; }
.drawer-delete-wrap { display:none; margin-bottom:1rem; }
.drawer-delete-wrap.visible { display:block; }
.btn-delete-part { width:100%; padding:11px; background:rgba(224,85,85,.1); border:1px solid rgba(224,85,85,.25); border-radius:var(--radius); color:var(--red); font-size:14px; font-family:'DM Sans',sans-serif; cursor:pointer; transition:background .15s; }
.btn-delete-part:hover { background:rgba(224,85,85,.2); }
.field { margin-bottom:1rem; }
.field label { display:block; margin-bottom:6px; font-size:12px; color:var(--text2); text-transform:uppercase; letter-spacing:.05em; }
.field input, .field select { width:100%; padding:11px 14px; border-radius:10px; border:1px solid var(--border); background:var(--bg3); color:var(--text); font-size:15px; font-family:'DM Sans',sans-serif; outline:none; transition:border-color .2s; }
.field input:focus, .field select:focus { border-color:var(--accent2); }
.field select option { background:var(--bg3); }
.field-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.drawer-footer { display:flex; gap:10px; margin-top:1.25rem; }
.btn-primary { flex:1; padding:13px; border:none; border-radius:10px; background:var(--accent2); color:black; font-size:15px; font-weight:500; font-family:'DM Sans',sans-serif; cursor:pointer; transition:background .15s; }
.btn-primary:hover { background:var(--accent); }
.btn-cancel { padding:13px 20px; border-radius:10px; border:1px solid var(--border); background:transparent; color:var(--text2); font-size:15px; font-family:'DM Sans',sans-serif; cursor:pointer; transition:border-color .15s; }
.btn-cancel:hover { border-color:var(--border2); color:var(--text); }

#toast { position:fixed; bottom:2rem; left:50%; transform:translateX(-50%) translateY(80px); background:var(--bg3); border:1px solid var(--border2); color:var(--text); padding:10px 20px; border-radius:99px; font-size:14px; transition:transform .3s, opacity .3s; opacity:0; z-index:999; white-space:nowrap; }
#toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
</style>
</head>
<body>
<div id="app">
  <header class="app-header">
    <div class="app-logo">P</div>
    <div>
      <div class="app-title">Peças & Oficina</div>
      <div class="app-subtitle">Controle de estoque</div>
    </div>
  </header>

  <button class="back-btn" id="back-btn">← Voltar</button>

  <div id="screen-search">
    <div class="search-hero">
      <h2 id="catalog-title">Catálogo</h2>
      <p id="catalog-subtitle">Navegue por marca, modelo, ano e versão</p>
      <div class="search-field" id="search-field" style="display:none">
        <input id="search-input" type="search" placeholder="Buscar..." autocomplete="off" />
      </div>
    </div>
    <div class="results-top">
      <div class="results-label" id="results-label">Marcas</div>
      <button class="add-part-btn" id="add-hierarchy-btn">+ Adicionar</button>
    </div>
    <div class="car-grid" id="car-grid"></div>
  </div>

  <div id="screen-parts" style="display:none">
    <div class="parts-header">
      <div>
        <div class="car-name" id="car-name"></div>
        <div class="car-meta" id="car-meta"></div>
      </div>
      <button class="add-part-btn" id="add-part-btn">+ Nova peça</button>
    </div>
    <div class="cat-chips" id="cat-chips"></div>
    <div class="parts-list" id="parts-list"></div>
  </div>
</div>

<div id="toast"></div>
<div class="drawer-backdrop" id="drawer-backdrop"></div>
<div class="drawer" id="drawer">
  <div class="drawer-handle"></div>
  <div class="drawer-title" id="drawer-title">Nova peça</div>
  <div class="drawer-delete-wrap" id="drawer-delete-wrap">
    <button class="btn-delete-part" id="btn-delete-part">🗑 Apagar esta peça</button>
  </div>
  <div class="field"><label>Nome da peça</label><input id="f-name" type="text" placeholder="Ex: Filtro de ar"/></div>
  <div class="field">
    <label>Categoria</label>
    <select id="f-cat">
      <option value="motor">Motor</option>
      <option value="eletrica">Elétrica</option>
      <option value="freios">Freios</option>
      <option value="ar">Ar-condicionado</option>
      <option value="transmissao">Transmissão</option>
      <option value="suspensao">Suspensão</option>
      <option value="funilaria">Funilaria</option>
      <option value="outro">Outro</option>
    </select>
  </div>
  <div class="field-row">
    <div class="field"><label>Quantidade</label><input id="f-qty" type="number" min="0" placeholder="0"/></div>
    <div class="field"><label>Estoque mínimo</label><input id="f-min" type="number" min="0" placeholder="1"/></div>
  </div>
  <div class="drawer-footer">
    <button class="btn-cancel" id="drawer-cancel">Cancelar</button>
    <button class="btn-primary" id="drawer-save">Salvar</button>
  </div>
</div>

<script>
// ── SVG icons ─────────────────────────────────────────────────────────────────
const NAV_ICONS = {
  marca:`<svg width="52" height="36" viewBox="0 0 52 36" fill="none"><rect x="2" y="14" width="48" height="16" rx="4" fill="currentColor" opacity=".18"/><path d="M8 14L14 4h24l6 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="13" cy="30" r="4" fill="currentColor" opacity=".6"/><circle cx="39" cy="30" r="4" fill="currentColor" opacity=".6"/><rect x="18" y="6" width="16" height="8" rx="1.5" fill="currentColor" opacity=".3"/></svg>`,
  modelo:`<svg width="52" height="36" viewBox="0 0 52 36" fill="none"><rect x="2" y="14" width="48" height="16" rx="4" fill="currentColor" opacity=".18"/><path d="M8 14L14 4h24l6 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="13" cy="30" r="4" fill="currentColor" opacity=".6"/><circle cx="39" cy="30" r="4" fill="currentColor" opacity=".6"/><rect x="18" y="6" width="16" height="8" rx="1.5" fill="currentColor" opacity=".3"/></svg>`,
  ano:`<svg width="44" height="36" viewBox="0 0 44 36" fill="none"><rect x="4" y="8" width="36" height="20" rx="3" fill="currentColor" opacity=".12"/><rect x="4" y="8" width="36" height="20" rx="3" stroke="currentColor" stroke-width="1.5" opacity=".4"/><text x="22" y="23" text-anchor="middle" font-family="monospace" font-size="11" fill="currentColor" opacity=".7" font-weight="700">ANO</text><circle cx="10" cy="32" r="3" fill="currentColor" opacity=".5"/><circle cx="34" cy="32" r="3" fill="currentColor" opacity=".5"/></svg>`,
  versao:`<svg width="44" height="36" viewBox="0 0 44 36" fill="none"><circle cx="22" cy="18" r="14" stroke="currentColor" stroke-width="1.5" opacity=".35"/><circle cx="22" cy="18" r="7" fill="currentColor" opacity=".12"/><line x1="22" y1="4" x2="22" y2="32" stroke="currentColor" stroke-width="1" opacity=".2"/><line x1="8" y1="18" x2="36" y2="18" stroke="currentColor" stroke-width="1" opacity=".2"/><text x="22" y="22" text-anchor="middle" font-size="9" font-family="monospace" fill="currentColor" opacity=".7" font-weight="700">VER</text></svg>`
};

const PART_ICONS = {
  motor:`<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="8" width="18" height="10" rx="2"/><path d="M7 8V6a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v2"/><line x1="12" y1="12" x2="12" y2="14"/><circle cx="12" cy="15" r="1"/><line x1="3" y1="13" x2="1" y2="13"/><line x1="23" y1="13" x2="21" y2="13"/></svg>`,
  eletrica:`<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>`,
  freios:`<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4"/><line x1="12" y1="3" x2="12" y2="8"/><line x1="12" y1="16" x2="12" y2="21"/><line x1="3" y1="12" x2="8" y2="12"/><line x1="16" y1="12" x2="21" y2="12"/></svg>`,
  ar:`<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M9.59 4.59A2 2 0 1 1 11 8H2"/><path d="M12.59 19.41A2 2 0 1 0 14 16H2"/><path d="M6.59 11.41A2 2 0 1 0 8 8H2"/></svg>`,
  transmissao:`<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="5" cy="6" r="2"/><circle cx="19" cy="6" r="2"/><circle cx="12" cy="18" r="2"/><line x1="5" y1="8" x2="5" y2="18"/><line x1="5" y1="18" x2="10" y2="18"/><line x1="19" y1="8" x2="19" y2="18"/><line x1="19" y1="18" x2="14" y2="18"/><line x1="12" y1="6" x2="12" y2="16"/><line x1="5" y1="6" x2="19" y2="6"/></svg>`,
  suspensao:`<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="19" r="2"/><path d="M12 17V11"/><line x1="9" y1="11" x2="15" y2="11"/><line x1="10" y1="11" x2="10" y2="7"/><line x1="14" y1="11" x2="14" y2="7"/><line x1="8" y1="7" x2="16" y2="7"/></svg>`,
  funilaria:`<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17l4-8h10l4 8"/><path d="M5 17h14"/><circle cx="7.5" cy="19.5" r="1.5"/><circle cx="16.5" cy="19.5" r="1.5"/><path d="M9 9l1-4h4l1 4"/></svg>`,
  outro:`<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>`
};

const CAT_LABELS = { motor:'Motor', eletrica:'Elétrica', freios:'Freios', ar:'Ar-condicionado', transmissao:'Transmissão', suspensao:'Suspensão', funilaria:'Funilaria', outro:'Outro' };
const CAT_COLORS = { motor:'cat-motor', eletrica:'cat-eletrica', freios:'cat-freios', ar:'cat-ar', transmissao:'cat-transmissao', suspensao:'cat-suspensao', funilaria:'cat-funilaria', outro:'cat-outro' };

// ── Seed (usado apenas se dados.json não estiver disponível e localStorage vazio) ──
const SEED = {
  marcas:[
    { id:'m1', nome:'Chevrolet', modelos:[
      { id:'mo1', nome:'Astra', anos:[
        { id:'a1', ano:'2000', versoes:[{ id:'v1', nome:'1.8' },{ id:'v2', nome:'2.0' }] }
      ]},
      { id:'mo2', nome:'Corsa', anos:[
        { id:'a2', ano:'2010', versoes:[{ id:'v3', nome:'1.0' }] }
      ]}
    ]},
    { id:'m2', nome:'Fiat', modelos:[
      { id:'mo3', nome:'Palio', anos:[
        { id:'a3', ano:'2003', versoes:[{ id:'v4', nome:'1.0' }] }
      ]}
    ]}
  ],
  pecas:[
    { id:'p1', versao_id:'v1', categoria:'motor',     nome:'Vela de ignição',    quantidade:'0', estoque_minimo:'4' },
    { id:'p2', versao_id:'v1', categoria:'motor',     nome:'Óleo do motor',      quantidade:'2', estoque_minimo:'1' },
    { id:'p3', versao_id:'v1', categoria:'freios',    nome:'Pastilha de freio',  quantidade:'1', estoque_minimo:'2' },
    { id:'p4', versao_id:'v1', categoria:'motor',     nome:'Correia dentada',    quantidade:'0', estoque_minimo:'1' },
    { id:'p5', versao_id:'v1', categoria:'ar',        nome:'Filtro do ar-cond.', quantidade:'1', estoque_minimo:'1' },
    { id:'p6', versao_id:'v1', categoria:'suspensao', nome:'Amortecedor diant.', quantidade:'2', estoque_minimo:'2' }
  ]
};

// ── Storage: persistência no servidor e fallback local ─────────────────────────
let db = { marcas:[], pecas:[] };

async function saveDB() {
  try {
    const res = await fetch('/api/dados', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(db)
    });
    if (!res.ok) throw new Error('Falha ao salvar no servidor');
    localStorage.setItem('oficina_db', JSON.stringify(db));
  } catch (err) {
    localStorage.setItem('oficina_db', JSON.stringify(db));
  }
}

async function loadDB() {
  try {
    const res = await fetch('/api/dados');
    if (!res.ok) throw new Error('Servidor indisponível');
    db = await res.json();
    renderSearch();
    return;
  } catch (err) {
    try {
      const raw = localStorage.getItem('oficina_db');
      if (raw) { db = JSON.parse(raw); renderSearch(); return; }
    } catch {}
    try {
      const data = await fetch('dados.json').then(r => r.json());
      db = data;
    } catch {
      db = JSON.parse(JSON.stringify(SEED));
    }
    saveDB();
    renderSearch();
  }
}

function uid() { return '_' + Math.random().toString(36).slice(2,9); }

// ── Helpers de navegação na árvore ───────────────────────────────────────────
// Retorna o nó pela posição na navegação atual
function getMarca(marcaId)   { return db.marcas.find(m => m.id === marcaId); }
function getModelo(marcaId, modeloId) { return getMarca(marcaId)?.modelos?.find(m => m.id === modeloId); }
function getAno(marcaId, modeloId, anoId) { return getModelo(marcaId, modeloId)?.anos?.find(a => a.id === anoId); }
function getVersao(marcaId, modeloId, anoId, versaoId) { return getAno(marcaId, modeloId, anoId)?.versoes?.find(v => v.id === versaoId); }

// ── Nav state ─────────────────────────────────────────────────────────────────
let navStep = 'marca';
let sel = { marcaId:null, modeloId:null, anoId:null, versaoId:null };
let searchQuery = '';
const STEP_TITLES = { marca:'Marcas', modelo:'Carros', ano:'Anos', versao:'Versões' };
const STEP_SUBTITLES = {
  marca: 'Busque por marca ou modelo',
  modelo: 'Busque por modelo da marca selecionada',
  ano: 'Selecione o ano do veículo',
  versao: 'Escolha a versão para gerenciar peças'
};
let activeCategory = 'todas';
let editingPartId = null;
// activeVersaoId para a tela de peças
let activeVersaoId = null;

// ── Render catálogo ───────────────────────────────────────────────────────────
function renderSearch() {
  const grid  = document.getElementById('car-grid');
  const label = document.getElementById('results-label');
  const title = document.getElementById('catalog-title');
  const subtitle = document.getElementById('catalog-subtitle');
  const searchField = document.getElementById('search-field');
  const searchInput = document.getElementById('search-input');

  title.textContent = STEP_TITLES[navStep] || 'Catálogo';
  subtitle.textContent = STEP_SUBTITLES[navStep] || 'Navegue pela seleção';
  searchInput.value = searchQuery;
  searchField.style.display = navStep === 'marca' || navStep === 'modelo' ? 'block' : 'none';
  if (navStep === 'marca') {
    searchInput.placeholder = 'Buscar marca ou modelo';
  } else if (navStep === 'modelo') {
    searchInput.placeholder = 'Buscar modelo';
  }

  document.getElementById('back-btn').style.display = navStep === 'marca' ? 'none' : 'inline-flex';

  // Monta lista de itens e ação de clique conforme o passo
  let items = [];   // [{ id, label, sub }]
  let icon  = NAV_ICONS[navStep] || NAV_ICONS.marca;

  if (navStep === 'marca') {
    label.textContent = 'Marcas';
    items = db.marcas
      .filter(m => {
        if (!searchQuery) return true;
        const query = searchQuery.toLowerCase();
        const matchesMarca = m.nome.toLowerCase().includes(query);
        const matchesModelo = (m.modelos||[]).some(md => md.nome.toLowerCase().includes(query));
        return matchesMarca || matchesModelo;
      })
      .map(m => ({
        id: m.id,
        label: m.nome,
        sub: (m.modelos||[]).length + ' modelo(s)'
      }));
  }
  else if (navStep === 'modelo') {
    const marca = getMarca(sel.marcaId);
    label.textContent = marca?.nome || '';
    items = (marca?.modelos||[])
      .filter(m => !searchQuery || m.nome.toLowerCase().includes(searchQuery.toLowerCase()))
      .map(m => ({
        id: m.id,
        label: m.nome,
        sub: (m.anos||[]).length + ' ano(s)'
      }));
  }
  else if (navStep === 'ano') {
    const modelo = getModelo(sel.marcaId, sel.modeloId);
    const marca  = getMarca(sel.marcaId);
    label.textContent = `${marca?.nome} › ${modelo?.nome}`;
    items = (modelo?.anos||[]).map(a => ({
      id: a.id,
      label: a.ano,
      sub: (a.versoes||[]).length + ' versão(ões)'
    }));
  }
  else if (navStep === 'versao') {
    const ano    = getAno(sel.marcaId, sel.modeloId, sel.anoId);
    const modelo = getModelo(sel.marcaId, sel.modeloId);
    const marca  = getMarca(sel.marcaId);
    label.textContent = `${marca?.nome} › ${modelo?.nome} › ${ano?.ano}`;
    items = (ano?.versoes||[]).map(v => ({
      id: v.id,
      label: v.nome,
      sub: db.pecas.filter(p => p.versao_id === v.id).length + ' peça(s)'
    }));
  }

  if (items.length === 0) {
    const stepLabels = { marca:'marca', modelo:'modelo', ano:'ano', versao:'versão' };
    grid.innerHTML = `<div class="empty-state">
      Nenhum item aqui ainda.<br>
      <span style="font-size:13px">Clique em <strong style="color:var(--accent2)">+ Adicionar</strong> para incluir um(a) ${stepLabels[navStep]}.</span>
    </div>`;
    return;
  }

  grid.innerHTML = items.map(item => `
    <div class="car-card" data-id="${item.id}">
      <div class="card-illustration">${icon}</div>
      <div class="car-card-model">${item.label}</div>
      <div class="car-card-sub">${item.sub}</div>
      <div class="card-actions">
        <button class="remove-btn" data-id="${item.id}">Remover</button>
      </div>
    </div>
  `).join('');

  // Clique no card → avança nível
  grid.querySelectorAll('.car-card').forEach(card => {
    card.addEventListener('click', e => {
      if (e.target.closest('.remove-btn')) return;
      const id = card.dataset.id;
      if (navStep === 'marca')  { sel.marcaId  = id; navStep = 'modelo'; searchQuery = ''; renderSearch(); }
      else if (navStep === 'modelo') { sel.modeloId = id; navStep = 'ano'; searchQuery = ''; renderSearch(); }
      else if (navStep === 'ano')    { sel.anoId    = id; navStep = 'versao'; searchQuery = ''; renderSearch(); }
      else if (navStep === 'versao') { openVersao(id); }
    });
  });

  // Remover item — apaga APENAS o nó específico, não os superiores
  grid.querySelectorAll('.remove-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const id = btn.dataset.id;

      if (navStep === 'marca') {
        const marca = getMarca(id);
        if (!confirm(`Remover marca "${marca?.nome}"? Todos os dados vinculados serão apagados.`)) return;
        // Apaga peças de todas as versões desta marca
        const vids = collectVersaoIds(marca);
        db.pecas = db.pecas.filter(p => !vids.includes(p.versao_id));
        db.marcas = db.marcas.filter(m => m.id !== id);
      }
      else if (navStep === 'modelo') {
        const modelo = getModelo(sel.marcaId, id);
        if (!confirm(`Remover modelo "${modelo?.nome}"?`)) return;
        const vids = collectVersaoIds(modelo);
        db.pecas = db.pecas.filter(p => !vids.includes(p.versao_id));
        getMarca(sel.marcaId).modelos = getMarca(sel.marcaId).modelos.filter(m => m.id !== id);
      }
      else if (navStep === 'ano') {
        const ano = getAno(sel.marcaId, sel.modeloId, id);
        if (!confirm(`Remover ano "${ano?.ano}"?`)) return;
        const vids = (ano?.versoes||[]).map(v => v.id);
        db.pecas = db.pecas.filter(p => !vids.includes(p.versao_id));
        getModelo(sel.marcaId, sel.modeloId).anos = getModelo(sel.marcaId, sel.modeloId).anos.filter(a => a.id !== id);
      }
      else if (navStep === 'versao') {
        const versao = getVersao(sel.marcaId, sel.modeloId, sel.anoId, id);
        if (!confirm(`Remover versão "${versao?.nome}"?`)) return;
        // Apaga só as peças desta versão e só esta versão — ano/modelo/marca permanecem
        db.pecas = db.pecas.filter(p => p.versao_id !== id);
        getAno(sel.marcaId, sel.modeloId, sel.anoId).versoes =
          getAno(sel.marcaId, sel.modeloId, sel.anoId).versoes.filter(v => v.id !== id);
      }

      saveDB();
      renderSearch();
    });
  });
}

// Coleta todos os versao_ids de um nó (marca ou modelo)
function collectVersaoIds(node) {
  const ids = [];
  if (!node) return ids;
  (node.modelos||[]).forEach(mo => (mo.anos||[]).forEach(a => (a.versoes||[]).forEach(v => ids.push(v.id))));
  (node.anos||[]).forEach(a => (a.versoes||[]).forEach(v => ids.push(v.id)));
  (node.versoes||[]).forEach(v => ids.push(v.id));
  return ids;
}

// ── Adicionar item na hierarquia ──────────────────────────────────────────────
function addHierarchyItem() {
  const hints = { marca:'Nova marca (ex: Honda)', modelo:'Novo modelo (ex: Civic)', ano:'Novo ano (ex: 2015)', versao:'Nova versão (ex: 2.0 EX)' };
  const value = prompt(hints[navStep]);
  if (!value || !value.trim()) return;
  const v = value.trim();

  if (navStep === 'marca') {
    db.marcas.push({ id:uid(), nome:v, modelos:[] });
  }
  else if (navStep === 'modelo') {
    getMarca(sel.marcaId).modelos = getMarca(sel.marcaId).modelos || [];
    getMarca(sel.marcaId).modelos.push({ id:uid(), nome:v, anos:[] });
  }
  else if (navStep === 'ano') {
    if (!/^\d{4}$/.test(v)) { toast('Digite um ano válido, ex: 2015'); return; }
    const modelo = getModelo(sel.marcaId, sel.modeloId);
    modelo.anos = modelo.anos || [];
    modelo.anos.push({ id:uid(), ano:v, versoes:[] });
  }
  else if (navStep === 'versao') {
    const ano = getAno(sel.marcaId, sel.modeloId, sel.anoId);
    ano.versoes = ano.versoes || [];
    ano.versoes.push({ id:uid(), nome:v });
  }

  saveDB();
  renderSearch();
  toast('Adicionado!');
}

// ── Abrir tela de peças ───────────────────────────────────────────────────────
function openVersao(versaoId) {
  activeVersaoId = versaoId;
  activeCategory = 'todas';

  const versao = getVersao(sel.marcaId, sel.modeloId, sel.anoId, versaoId);
  const ano    = getAno(sel.marcaId, sel.modeloId, sel.anoId);
  const modelo = getModelo(sel.marcaId, sel.modeloId);
  const marca  = getMarca(sel.marcaId);

  document.getElementById('screen-search').style.display = 'none';
  document.getElementById('screen-parts').style.display  = 'block';
  document.getElementById('car-name').textContent = `${marca?.nome} ${modelo?.nome}`;
  document.getElementById('car-meta').textContent = `${ano?.ano} · ${versao?.nome}`;

  renderCategoryChips();
  renderParts();
}

function goBack() {
  if (activeVersaoId) {
    activeVersaoId = null;
    document.getElementById('screen-search').style.display = 'block';
    document.getElementById('screen-parts').style.display  = 'none';
    return;
  }
  searchQuery = '';
  if (navStep === 'modelo') navStep = 'marca';
  else if (navStep === 'ano')    navStep = 'modelo';
  else if (navStep === 'versao') navStep = 'ano';
  renderSearch();
}

// ── Peças ─────────────────────────────────────────────────────────────────────
function versaoPecas() { return db.pecas.filter(p => p.versao_id === activeVersaoId); }
function filteredPecas() {
  const vp = versaoPecas();
  return activeCategory === 'todas' ? vp : vp.filter(p => p.categoria === activeCategory);
}

function renderCategoryChips() {
  const cats = ['todas', ...new Set(versaoPecas().map(p => p.categoria))];
  const wrap  = document.getElementById('cat-chips');
  wrap.innerHTML = cats.map(c => `
    <button class="chip ${c === activeCategory ? 'active' : ''}" data-cat="${c}">
      ${c === 'todas' ? 'Todas' : (CAT_LABELS[c]||c)}
    </button>
  `).join('');
  wrap.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => { activeCategory = chip.dataset.cat; renderCategoryChips(); renderParts(); });
  });
}

function stockClass(p) {
  const q = parseInt(p.quantidade)||0, m = parseInt(p.estoque_minimo)||1;
  if (q === 0) return 'stock-zero';
  if (q < m)   return 'stock-low';
  return '';
}

function renderParts() {
  const list = document.getElementById('parts-list');
  const fp   = filteredPecas();
  if (fp.length === 0) {
    list.innerHTML = `<div class="empty-state" style="grid-column:unset">Nenhuma peça nessa categoria.<br>Clique em "+ Nova peça" para adicionar.</div>`;
    return;
  }
  list.innerHTML = fp.map(p => {
    const qty = parseInt(p.quantidade)||0, sc = stockClass(p);
    return `
      <div class="part-row ${sc}" data-id="${p.id}">
        <div class="part-icon" style="color:var(--text2)">${partIcon(p.categoria)}</div>
        <div class="part-info">
          <div class="part-name">${p.nome}</div>
          <span class="part-cat ${CAT_COLORS[p.categoria]||'cat-outro'}">${CAT_LABELS[p.categoria]||p.categoria}</span>
        </div>
        <div class="part-stock">
          <div class="stock-num ${sc||'stock-ok'}" id="qty-${p.id}">${qty}</div>
          <div class="stock-label">unid.</div>
        </div>
        <div class="part-actions">
          <button class="qty-btn minus" onclick="changeQty('${p.id}',-1)" title="−1">−</button>
          <button class="qty-btn plus"  onclick="changeQty('${p.id}', 1)" title="+1">+</button>
          <button class="edit-btn"      onclick="openDrawer('${p.id}')" title="Editar">✎</button>
          <button class="del-part-btn"  onclick="deletePart('${p.id}')" title="Apagar">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          </button>
        </div>
      </div>`;
  }).join('');
}

function changeQty(id, delta) {
  const p = db.pecas.find(x => x.id === id);
  if (!p) return;
  p.quantidade = String(Math.max(0, (parseInt(p.quantidade)||0) + delta));
  saveDB();
  const el = document.getElementById('qty-' + id);
  const row = el?.closest('.part-row');
  if (el) {
    el.textContent = p.quantidade;
    el.classList.add('bump');
    setTimeout(() => el.classList.remove('bump'), 220);
    const sc = stockClass(p);
    if (row) row.className = 'part-row ' + sc;
    el.className = 'stock-num ' + (sc||'stock-ok');
  }
  toast(delta > 0 ? `+1 · ${p.nome}` : `-1 · ${p.nome}`);
}

function deletePart(id) {
  const p = db.pecas.find(x => x.id === id);
  if (!p || !confirm(`Apagar "${p.nome}"?`)) return;
  db.pecas = db.pecas.filter(x => x.id !== id);
  saveDB();
  renderCategoryChips();
  renderParts();
  toast('Peça apagada.');
}

// ── Drawer ────────────────────────────────────────────────────────────────────
function openDrawer(partId = null) {
  editingPartId = partId;
  document.getElementById('drawer-title').textContent = partId ? 'Editar peça' : 'Nova peça';
  document.getElementById('drawer-delete-wrap').classList.toggle('visible', !!partId);
  if (partId) {
    const p = db.pecas.find(x => x.id === partId);
    document.getElementById('f-name').value = p.nome;
    document.getElementById('f-cat').value  = p.categoria;
    document.getElementById('f-qty').value  = p.quantidade;
    document.getElementById('f-min').value  = p.estoque_minimo;
  } else {
    document.getElementById('f-name').value = '';
    document.getElementById('f-cat').value  = 'motor';
    document.getElementById('f-qty').value  = '';
    document.getElementById('f-min').value  = '1';
  }
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawer-backdrop').classList.add('open');
  setTimeout(() => document.getElementById('f-name').focus(), 300);
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-backdrop').classList.remove('open');
  editingPartId = null;
}

function saveDrawer() {
  const nome = document.getElementById('f-name').value.trim();
  if (!nome) { document.getElementById('f-name').focus(); return; }
  const cat = document.getElementById('f-cat').value;
  const qty = document.getElementById('f-qty').value || '0';
  const min = document.getElementById('f-min').value || '1';
  if (editingPartId) {
    const p = db.pecas.find(x => x.id === editingPartId);
    Object.assign(p, { nome, categoria:cat, quantidade:qty, estoque_minimo:min });
    toast('Peça atualizada!');
  } else {
    db.pecas.push({ id:uid(), versao_id:activeVersaoId, categoria:cat, nome, quantidade:qty, estoque_minimo:min });
    toast('Peça adicionada!');
  }
  saveDB();
  closeDrawer();
  renderCategoryChips();
  renderParts();
}

// ── Toast ─────────────────────────────────────────────────────────────────────
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

// ── Eventos ───────────────────────────────────────────────────────────────────
document.getElementById('back-btn').addEventListener('click', goBack);
document.getElementById('add-hierarchy-btn').addEventListener('click', addHierarchyItem);
document.getElementById('search-input').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  renderSearch();
});
document.getElementById('add-part-btn').addEventListener('click', () => openDrawer());
document.getElementById('drawer-cancel').addEventListener('click', closeDrawer);
document.getElementById('drawer-backdrop').addEventListener('click', closeDrawer);
document.getElementById('drawer-save').addEventListener('click', saveDrawer);
document.getElementById('f-name').addEventListener('keydown', e => { if (e.key === 'Enter') saveDrawer(); });
document.getElementById('btn-delete-part').addEventListener('click', () => {
  if (!editingPartId) return;
  const p = db.pecas.find(x => x.id === editingPartId);
  if (!p || !confirm(`Apagar "${p.nome}"?`)) return;
  db.pecas = db.pecas.filter(x => x.id !== editingPartId);
  saveDB(); closeDrawer(); renderCategoryChips(); renderParts();
  toast('Peça apagada.');
});

// ── Init ──────────────────────────────────────────────────────────────────────
loadDB();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peças & Oficina</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>

*, *::before, *::after {
  box-sizing: border-box;
function partIcon(cat, name) {
  const n = (name || '').toLowerCase();
  // heurísticas por nome
  if (/óleo|oleo|óleo|óleo|óleo do|óleo/.test(n)) return `<span class="part-emoji">🛢️</span>`;
  if (/vela|igniç|igni|igniçã|igniçã|igniã|ignição|ignicao|igni/.test(n)) return `<span class="part-emoji">🔥</span>`;
  if (/pastilha|disco|freio|freios/.test(n)) return `<span class="part-emoji">🛑</span>`;
  if (/filtro|filtros|filtro do|filtro de/.test(n)) return `<span class="part-emoji">🧼</span>`;
  if (/correi|correia|correiadentada|correia/.test(n)) return `<span class="part-emoji">🔗</span>`;
  if (/amortecedor|amortecedores|suspensã|suspensao|suspensão/.test(n)) return `<span class="part-emoji">🛞</span>`;
  // fallback por categoria
  const CAT_EMOJI = {
    motor: '🔧', eletrica: '⚡', freios: '🛑', ar: '❄️', transmissao: '⚙️', suspensao: '🛞', funilaria: '🧰', outro: '📦'
  };
  return `<span class="part-emoji">${CAT_EMOJI[cat] || CAT_EMOJI.outro}</span>`;
}
  padding: 0;
}

:root {
  --bg: #0f0f0f;
  --bg2: #181818;
  --bg3: #222;
  --border: #2e2e2e;
  --border2: #3a3a3a;
  --text: #f0ede8;
  --text2: #8a8680;
  --text3: #555;
  --accent: #e8d5a3;
  --accent2: #c9aa6e;
  --red: #e05555;
  --yellow: #d4a843;
  --green: #5aaa72;
  --radius: 10px;
  --radius-lg: 16px;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.5;
}

h1, h2, h3 { font-family: 'Syne', sans-serif; }

#app {
  max-width: 860px;
  margin: 0 auto;
  padding: 2rem 1.5rem 4rem;
}

.app-header {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-bottom: 3rem;
}

.app-logo {
  width: 38px;
  height: 38px;
  background: var(--accent2);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 18px;
  color: #0f0f0f;
}

.app-title { font-size: 18px; font-weight: 600; }
.app-subtitle { font-size: 13px; color: var(--text2); }

.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: var(--text2);
  background: none;
  border: none;
  cursor: pointer;
  margin-bottom: 1rem;
  font-family: 'DM Sans', sans-serif;
  transition: color .15s;
}
.back-btn:hover { color: var(--text); }

.search-hero { margin-bottom: 2rem; }
.search-hero h2 { font-size: 2rem; }
.search-hero p { color: var(--text2); }

.results-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1rem;
  gap: 1rem;
  flex-wrap: wrap;
}

.results-label {
  font-size: 13px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: .08em;
}

.car-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px;
}

.car-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1.1rem 1.2rem;
  cursor: pointer;
  transition: border-color .2s, transform .15s;
  position: relative;
}

.car-card:hover {
  border-color: var(--accent2);
  transform: translateY(-2px);
}

.card-illustration {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 60px;
  margin-bottom: 10px;
  opacity: .55;
  transition: opacity .2s;
}
.car-card:hover .card-illustration { opacity: .85; }

.car-card-model {
  font-family: 'Syne', sans-serif;
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 2px;
}

.car-card-sub {
  font-size: 12px;
  color: var(--text2);
}

.card-actions {
  display: flex;
  justify-content: flex-end;
  margin-top: 10px;
}

.remove-btn {
  border: none;
  background: none;
  color: var(--text3);
  cursor: pointer;
  font-size: 12px;
  font-family: 'DM Sans', sans-serif;
  transition: color .15s;
  padding: 2px 0;
}
.remove-btn:hover { color: var(--red); }

.empty-state {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--text3);
  font-size: 14px;
}

.parts-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 1rem;
  margin-bottom: 2rem;
  flex-wrap: wrap;
}

.car-name {
  font-family: 'Syne', sans-serif;
  font-size: 1.8rem;
}

.car-meta { color: var(--text2); }

.add-part-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--accent2);
  color: #0f0f0f;
  border: none;
  border-radius: var(--radius);
  padding: 10px 18px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: background .15s;
  white-space: nowrap;
}
.add-part-btn:hover { background: var(--accent); }

.cat-chips {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 1.5rem;
}

.chip {
  padding: 5px 14px;
  border-radius: 99px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  transition: all .15s;
}
.chip:hover { border-color: var(--border2); color: var(--text); }
.chip.active {
  background: var(--accent2);
  color: #000;
  border-color: var(--accent2);
}

.parts-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.part-row {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem 1.2rem;
  display: flex;
  align-items: center;
  gap: 1rem;
  transition: border-color .2s;
}
.part-row:hover { border-color: var(--border2); }
.part-row.stock-zero { border-color: rgba(224,85,85,.25); }
.part-row.stock-low  { border-color: rgba(212,168,67,.25); }

.part-icon {
  flex-shrink: 0;
  width: 38px;
  height: 38px;
  border-radius: 8px;
  background: var(--bg3);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: .6;
}

.part-emoji { font-size: 20px; line-height: 1; }

.part-info { flex: 1; min-width: 0; }

.part-name {
  font-size: 15px;
  font-weight: 500;
}

.part-cat {
  display: inline-block;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 99px;
  margin-top: 4px;
  font-weight: 500;
}

.cat-motor       { background: rgba(90,170,114,.15);  color: #5aaa72; }
.cat-eletrica    { background: rgba(232,213,163,.12); color: #e8d5a3; }
.cat-freios      { background: rgba(224,85,85,.15);   color: #e05555; }
.cat-ar          { background: rgba(100,160,220,.15); color: #78b4e0; }
.cat-transmissao { background: rgba(180,130,220,.15); color: #c090e0; }
.cat-suspensao   { background: rgba(212,168,67,.15);  color: #d4a843; }
.cat-funilaria   { background: rgba(160,200,160,.15); color: #80c080; }
.cat-outro       { background: rgba(138,134,128,.15); color: #8a8680; }

.part-stock {
  text-align: center;
  min-width: 54px;
}

.stock-num {
  font-family: 'Syne', sans-serif;
  font-size: 22px;
  font-weight: 700;
  transition: transform .2s;
}
.stock-num.bump { transform: scale(1.35); }

.stock-zero .stock-num { color: var(--red); }
.stock-low  .stock-num { color: var(--yellow); }
.stock-ok   .stock-num { color: var(--green); }

.stock-label { font-size: 11px; color: var(--text3); margin-top: 2px; }

.part-actions {
  display: flex;
  gap: 6px;
  align-items: center;
}

.qty-btn, .edit-btn, .del-part-btn {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg3);
  color: var(--text);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  font-family: 'DM Sans', sans-serif;
  transition: background .15s, border-color .15s, color .15s;
}
.qty-btn:hover     { background: var(--border); }
.qty-btn.plus:hover  { background: rgba(90,170,114,.2);  border-color: var(--green); color: var(--green); }
.qty-btn.minus:hover { background: rgba(224,85,85,.12); border-color: rgba(224,85,85,.4); color: var(--red); }
.edit-btn { font-size: 14px; color: var(--text3); }
.edit-btn:hover { color: var(--text2); border-color: var(--border2); }
.del-part-btn { color: var(--text3); }
.del-part-btn:hover { background: rgba(224,85,85,.12); border-color: rgba(224,85,85,.4); color: var(--red); }

.drawer-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.6);
  opacity: 0;
  pointer-events: none;
  transition: .3s;
  z-index: 100;
}
.drawer-backdrop.open { opacity: 1; pointer-events: all; }

.drawer {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%) translateY(100%);
  width: min(560px, 100vw);
  background: var(--bg2);
  border-radius: 20px 20px 0 0;
  border: 1px solid var(--border);
  border-bottom: none;
  padding: 1.5rem;
  transition: .35s cubic-bezier(.32,1,.28,1);
  z-index: 101;
}
.drawer.open { transform: translateX(-50%) translateY(0); }

.drawer-handle {
  width: 36px;
  height: 4px;
  background: var(--border2);
  border-radius: 99px;
  margin: 0 auto 1.25rem;
}

.drawer-title {
  font-family: 'Syne', sans-serif;
  font-size: 1.1rem;
  font-weight: 700;
  margin-bottom: 1.25rem;
}

.drawer-delete-wrap {
  display: none;
  margin-bottom: 1rem;
}
.drawer-delete-wrap.visible { display: block; }
.btn-delete-part {
  width: 100%;
  padding: 11px;
  background: rgba(224,85,85,.1);
  border: 1px solid rgba(224,85,85,.25);
  border-radius: var(--radius);
  color: var(--red);
  font-size: 14px;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  transition: background .15s;
}
.btn-delete-part:hover { background: rgba(224,85,85,.2); }

.field { margin-bottom: 1rem; }
.field label {
  display: block;
  margin-bottom: 6px;
  font-size: 12px;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: .05em;
}
.field input, .field select {
  width: 100%;
  padding: 11px 14px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--bg3);
  color: var(--text);
  font-size: 15px;
  font-family: 'DM Sans', sans-serif;
  outline: none;
  transition: border-color .2s;
}
.field input:focus, .field select:focus { border-color: var(--accent2); }
.field select option { background: var(--bg3); }

.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.drawer-footer {
  display: flex;
  gap: 10px;
  margin-top: 1.25rem;
}

.btn-primary {
  flex: 1;
  padding: 13px;
  border: none;
  border-radius: 10px;
  background: var(--accent2);
  color: black;
  font-size: 15px;
  font-weight: 500;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  transition: background .15s;
}
.btn-primary:hover { background: var(--accent); }

.btn-cancel {
  padding: 13px 20px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  font-size: 15px;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  transition: border-color .15s;
}
.btn-cancel:hover { border-color: var(--border2); color: var(--text); }

#toast {
  position: fixed;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--bg3);
  border: 1px solid var(--border2);
  color: var(--text);
  padding: 10px 20px;
  border-radius: 99px;
  font-size: 14px;
  transition: transform .3s, opacity .3s;
  opacity: 0;
  z-index: 999;
  white-space: nowrap;
}
#toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

</style>
</head>
<body>

<div id="app">

  <header class="app-header">
    <div class="app-logo">P</div>
    <div>
      <div class="app-title">Peças & Oficina</div>
      <div class="app-subtitle">Controle de estoque</div>
    </div>
  </header>

  <button class="back-btn" id="back-btn">← Voltar</button>

  <div id="screen-search">
    <div class="search-hero">
      <h2>Catálogo</h2>
      <p>Navegue por marca, modelo, ano e versão</p>
    </div>
    <div class="results-top">
      <div class="results-label" id="results-label">Marcas</div>
      <button class="add-part-btn" id="add-hierarchy-btn">+ Adicionar</button>
    </div>
    <div class="car-grid" id="car-grid"></div>
  </div>

  <div id="screen-parts" style="display:none">
    <div class="parts-header">
      <div>
        <div class="car-name" id="car-name"></div>
        <div class="car-meta" id="car-meta"></div>
      </div>
      <button class="add-part-btn" id="add-part-btn">+ Nova peça</button>
    </div>
    <div class="cat-chips" id="cat-chips"></div>
    <div class="parts-list" id="parts-list"></div>
  </div>

</div>

<div id="toast"></div>
<div class="drawer-backdrop" id="drawer-backdrop"></div>

<div class="drawer" id="drawer">
  <div class="drawer-handle"></div>
  <div class="drawer-title" id="drawer-title">Nova peça</div>

  <div class="drawer-delete-wrap" id="drawer-delete-wrap">
    <button class="btn-delete-part" id="btn-delete-part">🗑 Apagar esta peça</button>
  </div>

  <div class="field">
    <label>Nome da peça</label>
    <input id="f-name" type="text" placeholder="Ex: Filtro de ar" />
  </div>

  <div class="field">
    <label>Categoria</label>
    <select id="f-cat">
      <option value="motor">Motor</option>
      <option value="eletrica">Elétrica</option>
      <option value="freios">Freios</option>
      <option value="ar">Ar-condicionado</option>
      <option value="transmissao">Transmissão</option>
      <option value="suspensao">Suspensão</option>
      <option value="funilaria">Funilaria</option>
      <option value="outro">Outro</option>
    </select>
  </div>

  <div class="field-row">
    <div class="field">
      <label>Quantidade</label>
      <input id="f-qty" type="number" min="0" placeholder="0" />
    </div>
    <div class="field">
      <label>Estoque mínimo</label>
      <input id="f-min" type="number" min="0" placeholder="1" />
    </div>
  </div>

  <div class="drawer-footer">
    <button class="btn-cancel" id="drawer-cancel">Cancelar</button>
    <button class="btn-primary" id="drawer-save">Salvar</button>
  </div>
</div>

<script>

const NAV_ICONS = {
  marca: `<svg width="52" height="36" viewBox="0 0 52 36" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="2" y="14" width="48" height="16" rx="4" fill="currentColor" opacity=".18"/>
    <path d="M8 14L14 4h24l6 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="13" cy="30" r="4" fill="currentColor" opacity=".6"/>
    <circle cx="39" cy="30" r="4" fill="currentColor" opacity=".6"/>
    <rect x="18" y="6" width="16" height="8" rx="1.5" fill="currentColor" opacity=".3"/>
    <line x1="2" y1="22" x2="50" y2="22" stroke="currentColor" stroke-width="1.5" opacity=".2"/>
  </svg>`,

  modelo: `<svg width="52" height="36" viewBox="0 0 52 36" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="2" y="14" width="48" height="16" rx="4" fill="currentColor" opacity=".18"/>
    <path d="M8 14L14 4h24l6 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="13" cy="30" r="4" fill="currentColor" opacity=".6"/>
    <circle cx="39" cy="30" r="4" fill="currentColor" opacity=".6"/>
    <rect x="18" y="6" width="16" height="8" rx="1.5" fill="currentColor" opacity=".3"/>
  </svg>`,

  ano: `<svg width="44" height="36" viewBox="0 0 44 36" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="4" y="10" width="36" height="18" rx="3" fill="currentColor" opacity=".12"/>
    <rect x="4" y="10" width="36" height="18" rx="3" stroke="currentColor" stroke-width="1.5" opacity=".4"/>
    <text x="22" y="24" text-anchor="middle" font-family="monospace" font-size="11" fill="currentColor" opacity=".7" font-weight="700">2024</text>
    <circle cx="10" cy="32" r="3.5" fill="currentColor" opacity=".5"/>
    <circle cx="34" cy="32" r="3.5" fill="currentColor" opacity=".5"/>
  </svg>`,

  versao: `<svg width="44" height="36" viewBox="0 0 44 36" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="22" cy="18" r="14" stroke="currentColor" stroke-width="1.5" opacity=".35"/>
    <circle cx="22" cy="18" r="8" fill="currentColor" opacity=".12"/>
    <line x1="22" y1="4" x2="22" y2="32" stroke="currentColor" stroke-width="1" opacity=".2"/>
    <line x1="8" y1="18" x2="36" y2="18" stroke="currentColor" stroke-width="1" opacity=".2"/>
    <text x="22" y="22" text-anchor="middle" font-size="9" font-family="monospace" fill="currentColor" opacity=".7" font-weight="700">1.8</text>
  </svg>`
};

const PART_ICONS = {
  motor: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="8" width="18" height="10" rx="2"/>
    <path d="M7 8V6a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v2"/>
    <line x1="12" y1="12" x2="12" y2="14"/>
    <circle cx="12" cy="15" r="1"/>
    <line x1="3" y1="13" x2="1" y2="13"/>
    <line x1="23" y1="13" x2="21" y2="13"/>
  </svg>`,

  eletrica: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
  </svg>`,

  freios: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="9"/>
    <circle cx="12" cy="12" r="4"/>
    <line x1="12" y1="3" x2="12" y2="8"/>
    <line x1="12" y1="16" x2="12" y2="21"/>
    <line x1="3" y1="12" x2="8" y2="12"/>
    <line x1="16" y1="12" x2="21" y2="12"/>
  </svg>`,

  ar: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M9.59 4.59A2 2 0 1 1 11 8H2"/>
    <path d="M12.59 19.41A2 2 0 1 0 14 16H2"/>
    <path d="M6.59 11.41A2 2 0 1 0 8 8H2"/>
  </svg>`,

  transmissao: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="5" cy="6" r="2"/>
    <circle cx="19" cy="6" r="2"/>
    <circle cx="12" cy="18" r="2"/>
    <line x1="5" y1="8" x2="5" y2="18"/>
    <line x1="5" y1="18" x2="10" y2="18"/>
    <line x1="19" y1="8" x2="19" y2="18"/>
    <line x1="19" y1="18" x2="14" y2="18"/>
    <line x1="12" y1="6" x2="12" y2="16"/>
    <line x1="5" y1="6" x2="19" y2="6"/>
  </svg>`,

  suspensao: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="18" r="3"/>
    <path d="M12 15V9"/>
    <path d="M9 9h6"/>
    <path d="M10 9V5"/>
    <path d="M14 9V5"/>
    <line x1="8" y1="5" x2="16" y2="5"/>
    <path d="M10 12c0 0-2-1-2-3"/>
    <path d="M14 12c0 0 2-1 2-3"/>
  </svg>`,

  funilaria: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 17l4-8h10l4 8"/>
    <path d="M5 17h14"/>
    <circle cx="7.5" cy="19.5" r="1.5"/>
    <circle cx="16.5" cy="19.5" r="1.5"/>
    <path d="M9 9l1-4h4l1 4"/>
  </svg>`,

  outro: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="3"/>
    <path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
  </svg>`
};

function partIcon(cat) { return PART_ICONS[cat] || PART_ICONS.outro; }

const SEED_CARS = [
  { id:'1', marca:'Chevrolet', modelo:'Astra',  ano:'2000', versao:'1.8' },
  { id:'2', marca:'Chevrolet', modelo:'Corsa',  ano:'2010', versao:'1.0' },
  { id:'3', marca:'Fiat',      modelo:'Palio',  ano:'2003', versao:'1.0' },
  { id:'4', marca:'Volkswagen',modelo:'Gol',    ano:'2012', versao:'1.6' },
];

const SEED_PARTS = [
  { id:'101', carro_id:'1', categoria:'motor',    nome:'Vela de ignição',    quantidade:'0', estoque_minimo:'4' },
  { id:'102', carro_id:'1', categoria:'motor',    nome:'Óleo do motor',      quantidade:'2', estoque_minimo:'1' },
  { id:'103', carro_id:'1', categoria:'freios',   nome:'Pastilha de freio',  quantidade:'1', estoque_minimo:'2' },
  { id:'104', carro_id:'1', categoria:'motor',    nome:'Correia dentada',    quantidade:'0', estoque_minimo:'1' },
  { id:'105', carro_id:'1', categoria:'ar',       nome:'Filtro do ar-cond.', quantidade:'1', estoque_minimo:'1' },
  { id:'106', carro_id:'1', categoria:'suspensao',nome:'Amortecedor diant.', quantidade:'2', estoque_minimo:'2' },
];

const CAT_LABELS = {
  motor:'Motor', eletrica:'Elétrica', freios:'Freios',
  ar:'Ar-condicionado', transmissao:'Transmissão',
  suspensao:'Suspensão', funilaria:'Funilaria', outro:'Outro'
};

const CAT_COLORS = {
  motor:'cat-motor', eletrica:'cat-eletrica', freios:'cat-freios',
  ar:'cat-ar', transmissao:'cat-transmissao',
  suspensao:'cat-suspensao', funilaria:'cat-funilaria', outro:'cat-outro'
};

let cars  = JSON.parse(localStorage.getItem('cars'))  || SEED_CARS;
let parts = JSON.parse(localStorage.getItem('parts')) || SEED_PARTS;

let activeCar      = null;
let activeCategory = 'todas';
let editingPartId  = null;
let navStep        = 'marca';
let selectedFilters = { marca: null, modelo: null, ano: null };

function saveLocal() {
  localStorage.setItem('cars',  JSON.stringify(cars));
  localStorage.setItem('parts', JSON.stringify(parts));
}

function renderSearch() {
  const grid  = document.getElementById('car-grid');
  const label = document.getElementById('results-label');
  let items = [];
  let iconKey = navStep;

  if (navStep === 'marca') {
    label.textContent = 'Marcas';
    items = [...new Set(cars.map(c => c.marca))];
  } else if (navStep === 'modelo') {
    label.textContent = selectedFilters.marca;
    items = [...new Set(cars.filter(c => c.marca === selectedFilters.marca).map(c => c.modelo))];
  } else if (navStep === 'ano') {
    label.textContent = `${selectedFilters.marca} › ${selectedFilters.modelo}`;
    items = [...new Set(
      cars.filter(c => c.marca === selectedFilters.marca && c.modelo === selectedFilters.modelo).map(c => c.ano)
    )].sort();
  } else if (navStep === 'versao') {
    label.textContent = `${selectedFilters.marca} › ${selectedFilters.modelo} › ${selectedFilters.ano}`;
    items = [...new Set(
      cars.filter(c =>
        c.marca === selectedFilters.marca &&
        c.modelo === selectedFilters.modelo &&
        c.ano === selectedFilters.ano
      ).map(c => c.versao)
    )];
  }

  if (items.length === 0) {
    grid.innerHTML = `<div class="empty-state">Nenhum item encontrado.<br>Clique em "+ Adicionar" para começar.</div>`;
    return;
  }

  const svgIcon = NAV_ICONS[iconKey] || NAV_ICONS.marca;

  grid.innerHTML = items.map(item => `
    <div class="car-card" data-item="${item}" style="color:var(--accent2)">
      <div class="card-illustration">${svgIcon}</div>
      <div class="car-card-model">${item}</div>
      <div class="card-actions">
        <button class="remove-btn" data-remove="${item}">Remover</button>
      </div>
    </div>
  `).join('');

  grid.querySelectorAll('.car-card').forEach(card => {
    card.addEventListener('click', e => {
      if (e.target.closest('.remove-btn')) return;
      const item = card.dataset.item;
      if (navStep === 'marca')        { selectedFilters.marca  = item; navStep = 'modelo'; }
      else if (navStep === 'modelo')  { selectedFilters.modelo = item; navStep = 'ano'; }
      else if (navStep === 'ano')     { selectedFilters.ano    = item; navStep = 'versao'; }
      else if (navStep === 'versao') {
        const found = cars.find(c =>
          c.marca === selectedFilters.marca && c.modelo === selectedFilters.modelo &&
          c.ano === selectedFilters.ano && c.versao === item
        );
        if (found) { openCar(found.id); return; }
      }
      renderSearch();
    });
  });

  grid.querySelectorAll('.remove-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const value = btn.dataset.remove;
      if (!confirm(`Remover "${value}"? Todos os dados vinculados serão apagados.`)) return;
      if (navStep === 'marca') {
        const ids = cars.filter(c => c.marca === value).map(c => c.id);
        parts = parts.filter(p => !ids.includes(p.carro_id));
        cars  = cars.filter(c => c.marca !== value);
      } else if (navStep === 'modelo') {
        const ids = cars.filter(c => c.marca === selectedFilters.marca && c.modelo === value).map(c => c.id);
        parts = parts.filter(p => !ids.includes(p.carro_id));
        cars  = cars.filter(c => !(c.marca === selectedFilters.marca && c.modelo === value));
      } else if (navStep === 'ano') {
        const ids = cars.filter(c =>
          c.marca === selectedFilters.marca && c.modelo === selectedFilters.modelo && c.ano === value
        ).map(c => c.id);
        parts = parts.filter(p => !ids.includes(p.carro_id));
        cars  = cars.filter(c => !(c.marca === selectedFilters.marca && c.modelo === selectedFilters.modelo && c.ano === value));
      } else if (navStep === 'versao') {
        const found = cars.find(c =>
          c.marca === selectedFilters.marca && c.modelo === selectedFilters.modelo &&
          c.ano === selectedFilters.ano && c.versao === value
        );
        if (found) { parts = parts.filter(p => p.carro_id !== found.id); cars = cars.filter(c => c.id !== found.id); }
      }
      saveLocal();
      renderSearch();
    });
  });
}

function openCar(id) {
  activeCar = cars.find(c => c.id === id);
  if (!activeCar) return;
  document.getElementById('screen-search').style.display = 'none';
  document.getElementById('screen-parts').style.display  = 'block';
  document.getElementById('car-name').textContent = `${activeCar.marca} ${activeCar.modelo}`;
  document.getElementById('car-meta').textContent = `${activeCar.ano} · ${activeCar.versao}`;
  activeCategory = 'todas';
  renderCategoryChips();
  renderParts();
}

function goBack() {
  if (activeCar) {
    activeCar = null;
    document.getElementById('screen-search').style.display = 'block';
    document.getElementById('screen-parts').style.display  = 'none';
    return;
  }
  if (navStep === 'modelo')      navStep = 'marca';
  else if (navStep === 'ano')    navStep = 'modelo';
  else if (navStep === 'versao') navStep = 'ano';
  renderSearch();
}

function addHierarchyItem() {
  const labels = { marca:'marca (ex: Honda)', modelo:'modelo (ex: Civic)', ano:'ano (ex: 2015)', versao:'versão (ex: 2.0 EX)' };
  const value = prompt(`Novo ${labels[navStep]}:`);
  if (!value || !value.trim()) return;
  const v = value.trim();
  if (navStep === 'marca') {
    if (cars.some(c => c.marca.toLowerCase() === v.toLowerCase())) { toast('Marca já existe!'); return; }
    cars.push({ id: String(Date.now()), marca: v, modelo:'', ano:'', versao:'' });
  } else if (navStep === 'modelo') {
    cars.push({ id: String(Date.now()), marca: selectedFilters.marca, modelo: v, ano:'', versao:'' });
  } else if (navStep === 'ano') {
    if (!/^\d{4}$/.test(v)) { toast('Digite um ano válido, ex: 2015'); return; }
    cars.push({ id: String(Date.now()), marca: selectedFilters.marca, modelo: selectedFilters.modelo, ano: v, versao:'' });
  } else if (navStep === 'versao') {
    cars.push({ id: String(Date.now()), marca: selectedFilters.marca, modelo: selectedFilters.modelo, ano: selectedFilters.ano, versao: v });
  }
  saveLocal();
  renderSearch();
  toast('Adicionado!');
}

function carParts()      { return parts.filter(p => p.carro_id === activeCar.id); }
function filteredParts() {
  const cp = carParts();
  return activeCategory === 'todas' ? cp : cp.filter(p => p.categoria === activeCategory);
}

function renderCategoryChips() {
  const cats = ['todas', ...new Set(carParts().map(p => p.categoria))];
  const wrap  = document.getElementById('cat-chips');
  wrap.innerHTML = cats.map(c => `
    <button class="chip ${c === activeCategory ? 'active' : ''}" data-cat="${c}">
      ${c === 'todas' ? 'Todas' : (CAT_LABELS[c] || c)}
    </button>
  `).join('');
  wrap.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      activeCategory = chip.dataset.cat;
      renderCategoryChips();
      renderParts();
    });
  });
}

function stockClass(p) {
  const q = parseInt(p.quantidade) || 0;
  const m = parseInt(p.estoque_minimo) || 1;
  if (q === 0) return 'stock-zero';
  if (q < m)   return 'stock-low';
  return '';
}

function renderParts() {
  const list = document.getElementById('parts-list');
  const fp   = filteredParts();

  if (fp.length === 0) {
    list.innerHTML = `<div class="empty-state">Nenhuma peça nessa categoria.<br>Clique em "+ Nova peça" para adicionar.</div>`;
    return;
  }

  list.innerHTML = fp.map(p => {
    const qty = parseInt(p.quantidade) || 0;
    const sc  = stockClass(p);
    return `
      <div class="part-row ${sc}" data-id="${p.id}">
        <div class="part-icon" style="color:var(--text2)">${partIcon(p.categoria, p.nome)}</div>
        <div class="part-info">
          <div class="part-name">${p.nome}</div>
          <span class="part-cat ${CAT_COLORS[p.categoria] || 'cat-outro'}">${CAT_LABELS[p.categoria] || p.categoria}</span>
        </div>
        <div class="part-stock">
          <div class="stock-num ${sc || 'stock-ok'}" id="qty-${p.id}">${qty}</div>
          <div class="stock-label">unid.</div>
        </div>
        <div class="part-actions">
          <button class="qty-btn minus" onclick="changeQty('${p.id}', -1)" title="Remover 1">−</button>
          <button class="qty-btn plus"  onclick="changeQty('${p.id}',  1)" title="Adicionar 1">+</button>
          <button class="edit-btn"      onclick="openDrawer('${p.id}')" title="Editar">✎</button>
          <button class="del-part-btn"  onclick="deletePart('${p.id}')" title="Apagar peça">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
              <path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
            </svg>
          </button>
        </div>
      </div>
    `;
  }).join('');
}

function changeQty(id, delta) {
  const p = parts.find(x => x.id === id);
  if (!p) return;
  const nq = Math.max(0, (parseInt(p.quantidade) || 0) + delta);
  p.quantidade = String(nq);
  saveLocal();
  const el  = document.getElementById('qty-' + id);
  const row = el?.closest('.part-row');
  if (el) {
    el.textContent = nq;
    el.classList.add('bump');
    setTimeout(() => el.classList.remove('bump'), 220);
    const sc = stockClass(p);
    if (row) row.className = 'part-row ' + sc;
    el.className = 'stock-num ' + (sc || 'stock-ok');
  }
  toast(delta > 0 ? `+1 · ${p.nome}` : `-1 · ${p.nome}`);
}

function deletePart(id) {
  const p = parts.find(x => x.id === id);
  if (!p) return;
  if (!confirm(`Apagar "${p.nome}"?`)) return;
  parts = parts.filter(x => x.id !== id);
  saveLocal();
  renderCategoryChips();
  renderParts();
  toast('Peça apagada.');
}

function openDrawer(partId = null) {
  editingPartId = partId;
  const delWrap = document.getElementById('drawer-delete-wrap');
  document.getElementById('drawer-title').textContent = partId ? 'Editar peça' : 'Nova peça';
  delWrap.classList.toggle('visible', !!partId);
  if (partId) {
    const p = parts.find(x => x.id === partId);
    document.getElementById('f-name').value = p.nome;
    document.getElementById('f-cat').value  = p.categoria;
    document.getElementById('f-qty').value  = p.quantidade;
    document.getElementById('f-min').value  = p.estoque_minimo;
  } else {
    document.getElementById('f-name').value = '';
    document.getElementById('f-cat').value  = 'motor';
    document.getElementById('f-qty').value  = '';
    document.getElementById('f-min').value  = '1';
  }
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawer-backdrop').classList.add('open');
  setTimeout(() => document.getElementById('f-name').focus(), 300);
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-backdrop').classList.remove('open');
  editingPartId = null;
}

function saveDrawer() {
  const nome = document.getElementById('f-name').value.trim();
  if (!nome) { document.getElementById('f-name').focus(); return; }
  const cat = document.getElementById('f-cat').value;
  const qty = document.getElementById('f-qty').value || '0';
  const min = document.getElementById('f-min').value || '1';
  if (editingPartId) {
    const p = parts.find(x => x.id === editingPartId);
    p.nome = nome; p.categoria = cat; p.quantidade = qty; p.estoque_minimo = min;
    toast('Peça atualizada!');
  } else {
    parts.push({ id: String(Date.now()), carro_id: activeCar.id, categoria: cat, nome, quantidade: qty, estoque_minimo: min });
    toast('Peça adicionada!');
  }
  saveLocal();
  closeDrawer();
  renderCategoryChips();
  renderParts();
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

document.getElementById('back-btn').addEventListener('click', goBack);
document.getElementById('add-hierarchy-btn').addEventListener('click', addHierarchyItem);
document.getElementById('add-part-btn').addEventListener('click', () => openDrawer());
document.getElementById('drawer-cancel').addEventListener('click', closeDrawer);
document.getElementById('drawer-backdrop').addEventListener('click', closeDrawer);
document.getElementById('drawer-save').addEventListener('click', saveDrawer);
document.getElementById('f-name').addEventListener('keydown', e => { if (e.key === 'Enter') saveDrawer(); });
document.getElementById('btn-delete-part').addEventListener('click', () => {
  if (!editingPartId) return;
  const p = parts.find(x => x.id === editingPartId);
  if (!p || !confirm(`Apagar "${p.nome}"?`)) return;
  parts = parts.filter(x => x.id !== editingPartId);
  saveLocal();
  closeDrawer();
  renderCategoryChips();
  renderParts();
  toast('Peça apagada.');
});

renderSearch();

</script>
</body>
</html>
